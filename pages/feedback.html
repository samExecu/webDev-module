    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-display" href="../index.html">Sam</a>
        <button
          class="navbar-toggler"

    <div class="form">
      <h2>Feedback Form</h2>
      <br />
      <form method="get">
        <h3>Full Name</h3>
        <input
          type="text"
          placeholder="Enter your name"
          minlength="3"
          required
        />

        <h3>Email</h3>
        <input type="email" placeholder="Enter email" required />
        <br />
        <h3>Rating</h3>
        <label><input type="radio" name="rating" /> Very Satisfied </label>
        <label><input type="radio" name="rating" /> Satisfied</label>
        <label><input type="radio" name="rating" required /> Neutral</label>
        <label><input type="radio" name="rating" /> Unsatisfied</label>
        <br />
        <h3>Interests</h3>
        <label><input type="checkbox" /> Web Development</label>
        <label><input type="checkbox" /> Mobile Development</label>
        <label><input type="checkbox" /> AI & Machine Learning</label>
        <br />
        <h3>Country</h3>
        <select required>
          <option value="">Select country</option>
          <option>Nepal</option>
          <option>America</option>
          <option>Israel</option>
        </select>
        <br />
        <label>Write your feedback here</label>
        <textarea maxlength="300" placeholder="Feedback..."></textarea>
        <br />
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
